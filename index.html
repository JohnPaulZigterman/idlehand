<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IdleHand Casino</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrapper">

<header class="game-header">
  <h1>IdleHand Casino</h1>
  <p class="subtitle">Poker Idle Machine</p>
  <div id="score" class="score">$ 0</div>
</header>

<div class="main-layout">

<section class="upgrades-panel">
<h2>Global Upgrades</h2>

<div class="btn-row">
<button id="buyAuto" class="btn">Unlock Auto</button>
<button id="speedUpgrade" class="btn">Speed Upgrade</button>
<button id="buyDeck" class="btn">Buy Deck</button>
<button id="buyBlackjack" class="btn">Unlock Blackjack (500)</button>
<button id="buyPlinko" class="btn">Unlock Plinko (750)</button>
</div>
</section>

<section class="panel floating-panel" id="pokerPanel">

<div class="panel-header">
<h2>Decks</h2>
<button class="btn icon-btn panel-toggle" data-target="pokerPanel" aria-label="Minimize Decks">_</button>
</div>

<div class="panel-body">
<div id="handsContainer"></div>

<div class="btn-row center">
<button id="generate" class="btn primary">Deal</button>
<button id="auto" class="btn secondary hidden">Auto Deal</button>
</div>
</div>

</section>

<div class="floating-group" id="sideGames" style="display:none;">

<section class="panel floating-panel" id="blackjackPanel" style="display:none;">

<div class="panel-header">
<h2>Blackjack Table</h2>
<button class="btn icon-btn panel-toggle" data-target="blackjackPanel" aria-label="Minimize Blackjack">_</button>
</div>

<div class="panel-body">
<div class="bj-section">
<h3>Dealer</h3>
<div id="bjDealer" class="hand"></div>
</div>

<div class="bj-section">
<h3>Player</h3>
<div id="bjPlayer" class="hand"></div>
</div>

<div class="btn-row center bjControls">
<button class="btn bj-control" onclick="bjHit()">Hit</button>
<button class="btn bj-control" onclick="bjStand()">Stand</button>
<button class="btn bj-control" onclick="bjDouble()">Double</button>
<button class="btn bj-control" onclick="bjSplit()">Split</button>
</div>

<div class="bj-bet-panel">
<div class="bj-chip-rack" id="bjChipRack">
<button class="bet-chip chip-1" data-chip-value="1">1</button>
<button class="bet-chip chip-5" data-chip-value="5">5</button>
<button class="bet-chip chip-25" data-chip-value="25">25</button>
<button class="bet-chip chip-100" data-chip-value="100">100</button>
<button class="bet-chip chip-500" data-chip-value="500">500</button>
</div>
<div class="btn-row bj-bet-row">
<div class="bj-bet-total">Bet: <span id="bjBetDisplay">25</span></div>
<input id="betInput" class="btn" type="number" min="1" value="25" placeholder="Bet chips">
<button id="clearBjBet" class="btn">Clear</button>
<button id="blackjackBtn" class="btn secondary">Deal</button>
</div>
</div>
</div>

</section>

<section class="panel floating-panel" id="plinkoPanel" style="display:none;">

<div class="panel-header">
<h2>Plinko Board</h2>
<button class="btn icon-btn panel-toggle" data-target="plinkoPanel" aria-label="Minimize Plinko">_</button>
</div>

<div class="panel-body">
<div class="plinko-settings">
<label>Risk <span id="plinkoRiskLabel">Medium</span>
<input id="plinkoRiskSlider" type="range" min="1" max="3" step="1" value="2">
</label>
<label>Layers <span id="plinkoLayersLabel">7</span>
<input id="plinkoLayersSlider" type="range" min="5" max="12" step="1" value="7">
</label>
</div>

<div class="plinko-board" id="plinkoBoard">
<div class="plinko-pegs" id="plinkoPegs"></div>
<div class="plinko-slots" id="plinkoSlots"></div>
</div>

<div class="btn-row center plinkoControls">
<button id="buyPlinkoAuto" class="btn">Unlock Autoplay (1500)</button>
<button id="plinkoAutoBtn" class="btn secondary hidden">Autoplay</button>
</div>

<div id="plinkoResult" class="result plinko-result">Ready to drop.</div>

<div class="bj-bet-panel plinko-bet-panel">
<div class="bj-chip-rack" id="plinkoChipRack">
<button class="bet-chip chip-1 plinko-bet-chip" data-chip-value="1">1</button>
<button class="bet-chip chip-5 plinko-bet-chip" data-chip-value="5">5</button>
<button class="bet-chip chip-25 plinko-bet-chip" data-chip-value="25">25</button>
<button class="bet-chip chip-100 plinko-bet-chip" data-chip-value="100">100</button>
<button class="bet-chip chip-500 plinko-bet-chip" data-chip-value="500">500</button>
</div>
<div class="btn-row bj-bet-row">
<div class="bj-bet-total">Bet: <span id="plinkoBetDisplay">25</span></div>
<input id="plinkoBetInput" class="btn" type="number" min="1" value="25" placeholder="Bet chips">
<button id="clearPlinkoBet" class="btn">Clear</button>
<button id="plinkoDropBtn" class="btn secondary">Drop</button>
</div>
</div>
</div>

</section>

</div>

</div>

<div id="toastContainer"></div>
<div id="chipLayer"></div>

<script src="script.js"></script>

</body>
</html>
